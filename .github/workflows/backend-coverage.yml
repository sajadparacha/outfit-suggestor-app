name: Backend coverage gate

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-coverage.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-coverage.yml"

jobs:
  money-path-coverage:
    name: Money-path coverage (≥60%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run pytest with coverage gate
        env:
          DATABASE_URL: "sqlite:///:memory:"
          WARDROBE_AI_MODEL: openai
        run: |
          pytest tests/ \
            --cov=routes \
            --cov=services \
            --cov=controllers \
            --cov=dependencies \
            --cov=utils.auth \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -q --tb=short \
            -o addopts=

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore
